<ion-app>
  <ion-split-pane contentId="main" when="md">
    <ion-menu menuId="main-menu" contentId="main">
      <ion-header>
        <ion-toolbar color="secondary">
          <ion-title>Elite Schedule</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <ion-list>
          <ion-menu-toggle auto-hide="false">
            <ion-item button (click)="goHome()">
              <ion-icon name="home" slot="start"></ion-icon>
              <ion-label>Home</ion-label>
            </ion-item>
          </ion-menu-toggle>
          <ion-menu-toggle auto-hide="false">
            <ion-item button (click)="goToTournaments()">
              <ion-icon name="game-controller-outline" slot="start"></ion-icon>
              <ion-label>Find a tournament</ion-label>
            </ion-item>
          </ion-menu-toggle>
          <ion-menu-toggle auto-hide="false">
            <ion-item button (click)="goVibration()">
              <ion-icon name="phone-portrait-outline" slot="start"></ion-icon>
              <ion-label>Check your vibration</ion-label>
            </ion-item>
          </ion-menu-toggle>
          <ion-menu-toggle auto-hide="false">
            <ion-item button (click)="goGeolocation()">
              <ion-icon name="location-outline" slot="start"></ion-icon>
              <ion-label>Check your geolocation</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>

    <div class="ion-page" id="main">
      <ion-router-outlet></ion-router-outlet>
    </div>
  </ion-split-pane>
</ion-app>
